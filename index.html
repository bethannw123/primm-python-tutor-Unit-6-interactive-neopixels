  <script>
const { useState, useEffect, useRef } = React;

const PHASES = ["predict","run","investigate","modify","make"];
const phaseInfo = {

var OFF=[0,0,0],RED=[255,0,0],GREEN=[0,255,0],BLUE=[0,0,255],WHITE=[255,255,255],
    YELLOW=[255,200,0],PURPLE=[160,0,255],CYAN=[0,220,220],ORANGE=[255,100,0],PINK=[255,20,120];

var CONCEPTS = [
  {
    id:"c1", title:"Concept 1: for loop with range()",
    problems:[
      {
        id:"p1a", phase_start:"predict",
        code:"import neopixel\nimport board\n\npixels = neopixel.NeoPixel(board.D6, 12)\n\nfor i in range(6):\n    pixels[i] = (255, 0, 0)",
        predict:{
          question:"How many pixels will light up, and what color will they be?",
          options:["All 12 pixels — red","6 pixels — red","6 pixels — starting from pixel 6","12 pixels — different colors"],
          answer:1,
          hint:"range(6) generates the numbers 0,1,2,3,4,5 — that is 6 numbers. Each one sets one pixel to red (255,0,0).",
          retry:{
            intro:"Similar example — same idea, different range:",
            code:"for i in range(4):\n    pixels[i] = (0, 255, 0)",
            question:"How many pixels light up, and what color?",
            options:[
              {label:"4 pixels — green", correct:true},
              {label:"12 pixels — green", correct:false, feedback:"range(4) only generates 4 numbers: 0,1,2,3."},
              {label:"4 pixels — red", correct:false, feedback:"(0,255,0) is green in RGB — red would be (255,0,0)."},
              {label:"All pixels off", correct:false, feedback:"pixels[i] = (0,255,0) sets each pixel to green."}
            ],
            explanation:"range(4) gives 0,1,2,3 — 4 pixels. (0,255,0) is green."
          }
        },
        run:{
          steps:[
            {line:"pixels = neopixel.NeoPixel(board.D6, 12)", delay:700, result:null, commentary:"NeoPixel strip initialized — all 12 pixels off.", pixelState:[OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF]},
            {line:"for i in range(6):", delay:600, result:null, commentary:"Loop begins. range(6) will iterate i = 0, 1, 2, 3, 4, 5."},
            {line:"    pixels[0] = (255, 0, 0)  # i=0", delay:500, result:null, commentary:"i=0: pixel 0 lights up red.", pixelState:[RED,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF]},
            {line:"    pixels[1] = (255, 0, 0)  # i=1", delay:500, result:null, commentary:"i=1: pixel 1 lights up red.", pixelState:[RED,RED,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF]},
            {line:"    pixels[2] = (255, 0, 0)  # i=2", delay:500, result:null, commentary:"i=2: pixel 2 lights up red.", pixelState:[RED,RED,RED,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF]},
            {line:"    pixels[3] = (255, 0, 0)  # i=3", delay:500, result:null, commentary:"i=3: pixel 3 lights up red.", pixelState:[RED,RED,RED,RED,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF]},
            {line:"    pixels[4] = (255, 0, 0)  # i=4", delay:500, result:null, commentary:"i=4: pixel 4 lights up red.", pixelState:[RED,RED,RED,RED,RED,OFF,OFF,OFF,OFF,OFF,OFF,OFF]},

        investigate:{
          questions:[
            {
              q:"What values does range(6) generate?",

              answer:1,
              hint:"range() always starts at 0 by default. range(6) gives exactly 6 numbers: 0 through 5.",
              retry:{
                intro:"What does range(3) generate?",
                code:"for i in range(3):\n    print(i)",
                question:"What values will print?",
                options:[
                  {label:"1, 2, 3", correct:false, feedback:"range() starts at 0, not 1."},

                  {label:"0, 1, 2, 3", correct:false, feedback:"range(3) gives exactly 3 values: 0, 1, 2."},

                explanation:"range(n) always starts at 0 and generates n values: 0 through n-1."

            {
              q:"What does the variable i represent inside the loop?",

              hint:"i takes the value 0, then 1, then 2... and is used as pixels[i] to select which pixel to set.",
              retry:{
                intro:"In this code, what does i control?",

                explanation:"i is used as the index pixels[i], selecting a different pixel each iteration."

            },
            {

                intro:"If this runs on a 12-pixel strip, which pixels stay off?",
                code:"for i in range(3):\n    pixels[i] = (255,255,0)",

                  {label:"All pixels stay off", correct:false, feedback:"The loop does set pixels 0, 1, and 2."},
                  {label:"No pixels stay off", correct:false, feedback:"range(3) only reaches indices 0, 1, 2."}

                explanation:"range(3) only touches indices 0, 1, 2 — the rest stay off."
              }
            }
          ]
        },
        modify:{

            intro:"Similar challenge — which code lights pixels 0-7 in green?",

              {label:"for i in range(8):\n    pixels[i] = (255, 0, 0)", correct:false, feedback:"range(8) is right, but (255,0,0) is red. Green is (0,255,0)."},

            explanation:"range(8) covers indices 0-7. (0,255,0) is green. pixels[i] uses the loop variable to advance."
          }
        },
        make:{
          prompt:"Write a for loop that lights pixels 0-11 alternating red and off. Pixel 0=red, pixel 1=off, pixel 2=red... Use i % 2 == 0 to check even numbers.",
          options:[
            {label:"for i in range(12):\n    if i % 2 == 0:\n        pixels[i] = (255,0,0)\n    else:\n        pixels[i] = (0,0,0)", correct:true},
            {label:"for i in range(12):\n    pixels[i] = (255,0,0)", correct:false, feedback:"This lights every pixel red — there is no alternating pattern. You need an if/else to skip odd pixels."},
            {label:"for i in range(6):\n    pixels[i*2] = (255,0,0)", correct:false, feedback:"This creates the pattern but never explicitly sets odd pixels to off. Use the if/else version."},
            {label:"for i in range(12):\n    if i % 2 == 0:\n        pixels[i] = (255,0,0)", correct:false, feedback:"This sets even pixels to red but never sets odd pixels to off — previous state could bleed through."}
          ],
          explanation:"range(12) covers all pixels. i % 2 == 0 is True for even indices — those get red. The else sets odd indices to (0,0,0) — off.",
          retry:{
            intro:"Similar pattern — which code lights every third pixel (0,3,6,9) in purple, rest off?",
            options:[
              {label:"for i in range(12):\n    if i % 3 == 0:\n        pixels[i] = (160,0,255)\n    else:\n        pixels[i] = (0,0,0)", correct:true},
              {label:"for i in range(12):\n    if i % 3 == 0:\n        pixels[i] = (160,0,255)", correct:false, feedback:"Doesn't set non-multiples of 3 to off — previous state could bleed through."},
              {label:"for i in range(4):\n    pixels[i*3] = (160,0,255)", correct:false, feedback:"This sets 0,3,6,9 to purple but doesn't clear the other pixels."},
              {label:"for i in range(12):\n    if i % 2 == 0:\n        pixels[i] = (160,0,255)\n    else:\n        pixels[i] = (0,0,0)", correct:false, feedback:"% 2 selects every other pixel. You need % 3 for every third pixel."}
            ],
            explanation:"i % 3 == 0 is True for 0,3,6,9. The else ensures all other pixels are explicitly turned off."
          }
        }
      },
      {
        id:"p1b", phase_start:"modify",
        code:"for i in range(12):\n    pixels[i] = (255, 200, 0)",
        modify:{
          prompt:"This lights all 12 pixels yellow. Change it to light only the LAST 6 pixels (6-11) in cyan using range(start, stop).",
          options:[
            {label:"for i in range(6, 12):\n    pixels[i] = (0, 220, 220)", correct:true},
            {label:"for i in range(6, 12):\n    pixels[i] = (255, 200, 0)", correct:false, feedback:"range(6,12) is correct for pixels 6-11, but (255,200,0) is yellow. Cyan is (0,220,220)."},
            {label:"for i in range(6, 11):\n    pixels[i] = (0, 220, 220)", correct:false, feedback:"range(6,11) goes from 6 to 10 — it misses pixel 11. The stop value is exclusive, so use range(6,12)."},
            {label:"for i in range(0, 6):\n    pixels[i] = (0, 220, 220)", correct:false, feedback:"range(0,6) lights pixels 0-5 — the FIRST half. You need range(6,12) for the last half."}
          ],
          explanation:"range(start, stop) lets you control where the loop begins. range(6,12) generates 6,7,8,9,10,11.",
          retry:{
            intro:"Which code lights pixels 3-8 in orange?",
            options:[
              {label:"for i in range(3, 9):\n    pixels[i] = (255, 100, 0)", correct:true},
              {label:"for i in range(3, 8):\n    pixels[i] = (255, 100, 0)", correct:false, feedback:"range(3,8) goes 3,4,5,6,7 — it misses pixel 8. The stop is exclusive, so use range(3,9)."},
              {label:"for i in range(3, 9):\n    pixels[i] = (0, 255, 0)", correct:false, feedback:"range(3,9) is correct but (0,255,0) is green. Orange is (255,100,0)."},
              {label:"for i in range(9):\n    pixels[i] = (255, 100, 0)", correct:false, feedback:"range(9) starts at 0, not 3. Use range(3,9) to start at pixel 3."}
            ],
            explanation:"range(3,9) generates 3,4,5,6,7,8. The stop value is always exclusive."
          }
        },
        make:{
          prompt:"Create a progress bar: light the first 8 pixels in green and the last 4 in red — all in one program.",
          options:[
            {label:"for i in range(8):\n    pixels[i] = (0,255,0)\nfor i in range(8,12):\n    pixels[i] = (255,0,0)", correct:true},
            {label:"for i in range(12):\n    if i < 8:\n        pixels[i] = (0,255,0)\n    else:\n        pixels[i] = (255,0,0)", correct:true},
            {label:"for i in range(8):\n    pixels[i] = (0,255,0)\nfor i in range(4):\n    pixels[i] = (255,0,0)", correct:false, feedback:"The second loop uses range(4) which overwrites pixels 0-3 with red. Use range(8,12) to target pixels 8-11."},
            {label:"for i in range(8,12):\n    pixels[i] = (0,255,0)\nfor i in range(8):\n    pixels[i] = (255,0,0)", correct:false, feedback:"The ranges are swapped — this lights 8-11 green and 0-7 red, which is the reverse of the goal."}
          ],
          explanation:"Two sequential loops or one loop with if/else both work. The key: range(8,12) targets the last 4 pixels, not range(4).",
          retry:{
            intro:"Light pixels 0-3 in pink, pixels 4-7 in blue, pixels 8-11 in white.",
            options:[
              {label:"for i in range(4):\n    pixels[i]=(255,20,120)\nfor i in range(4,8):\n    pixels[i]=(0,0,255)\nfor i in range(8,12):\n    pixels[i]=(255,255,255)", correct:true},
              {label:"for i in range(4):\n    pixels[i]=(255,20,120)\nfor i in range(4):\n    pixels[i]=(0,0,255)\nfor i in range(4):\n    pixels[i]=(255,255,255)", correct:false, feedback:"All three loops use range(4) starting at 0 — they overwrite each other. Use range(4,8) and range(8,12)."},
              {label:"for i in range(12):\n    pixels[i]=(255,20,120)", correct:false, feedback:"This only lights all pixels pink — no three-zone pattern."},
              {label:"for i in range(4,8):\n    pixels[i]=(255,20,120)\nfor i in range(8,12):\n    pixels[i]=(0,0,255)\nfor i in range(12):\n    pixels[i]=(255,255,255)", correct:false, feedback:"The last loop overwrites everything with white."}
            ],
            explanation:"Three loops each targeting a non-overlapping range: range(4), range(4,8), range(8,12)."
          }
        }
      }
    ]
  },
  {
    id:"c2", title:"Concept 2: while loops",
    problems:[
      {
        id:"p2a", phase_start:"predict",
        code:"i = 0\nwhile i < 6:\n    pixels[i] = (0, 255, 0)\n    i += 1",
        predict:{
          question:"What does this while loop produce on the strip?",

          answer:1,
          hint:"i starts at 0 and increases by 1 each time. The loop runs while i < 6, so it stops when i reaches 6 — after lighting pixels 0-5.",
          retry:{
            intro:"Similar — what does this while loop produce?",
            code:"i = 0\nwhile i < 3:\n    pixels[i] = (255, 0, 255)\n    i += 1",

            options:[
              {label:"Pixels 0-3 in purple", correct:false, feedback:"i < 3 stops before i=3, so only pixels 0,1,2 light up."},
              {label:"Pixels 0-2 in purple", correct:true},
              {label:"All 12 pixels purple", correct:false, feedback:"The condition i < 3 stops the loop after 3 iterations."},
              {label:"Nothing — infinite loop", correct:false, feedback:"i += 1 increments i each time, so it will eventually reach 3 and stop."}
            ],
            explanation:"i < 3 allows i=0,1,2 but stops at i=3. Three pixels light up."
          }
        },
        run:{
          steps:[
            {line:"i = 0", delay:600, result:null, commentary:"i starts at 0. Strip is off.", pixelState:[OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF,OFF]},
